<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MES Operator | Piec</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/core/shell.css">
</head>
<body class="mes-operator-page" data-app-module="mes-operator" data-app-layout="operator">
    <main class="mes-operator-shell">
        <section class="mes-operator-topbar">
            <div class="mes-operator-title-row">
                <p class="eyebrow">MES</p>
                <h1>Piec / Reflow</h1>
            </div>
            <span id="operator-refresh-state" class="phase-badge neutral">-</span>
        </section>

        <section class="mes-scan-panel">
            <form id="operator-scan-form">
                <div class="mes-board-side-toggle" role="radiogroup" aria-label="Strona plytki">
                    <label class="mes-board-side-option">
                        <input type="radio" name="boardSide" value="top" checked>
                        <span>Top</span>
                    </label>
                    <label class="mes-board-side-option">
                        <input type="radio" name="boardSide" value="bot">
                        <span>Bot</span>
                    </label>
                </div>
                <input
                    id="operator-scan-input"
                    name="scan"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    inputmode="text"
                    enterkeyhint="go"
                    placeholder="Skanuj KKW"
                    aria-label="Skan KKW"
                    autofocus
                >
                <button type="submit">Start</button>
            </form>
            <p id="operator-message" class="note">Zeskanuj KKW.</p>
        </section>

        <section id="operator-active-batch" class="mes-active-batch">
            <div class="mes-empty-state">
                <span>Brak aktywnej partii</span>
                <strong>Zeskanuj KKW</strong>
            </div>
        </section>

        <section class="mes-operator-actions">
            <button id="operator-reset-transits" class="ghost" type="button">Reset pieca</button>
            <button id="operator-end-batch" class="danger-button" type="button">Zakoncz partie</button>
        </section>
    </main>

    <script src="/core/modules.js"></script>
    <script src="/core/shell.js"></script>
    <script src="/mes/operator/operator.js"></script>
</body>
</html>
