<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendo Workspace | Logowanie</title>
    <link rel="stylesheet" href="/login/login.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-card__heading">
                <p class="auth-card__eyebrow">Vendo Workspace</p>
                <h1>Logowanie</h1>
                <p class="auth-card__copy">Zaloguj sie do aplikacji, aby przejsc do dostepnych modulow roboczych.</p>
            </div>

            <form id="login-form" class="auth-form">
                <label>
                    <span>Login</span>
                    <input id="login-input" name="login" type="text" autocomplete="username" required>
                </label>
                <label>
                    <span>Haslo</span>
                    <input id="password-input" name="password" type="password" autocomplete="current-password" required>
                </label>
                <input id="next-input" name="next" type="hidden">
                <button id="login-submit" type="submit">Zaloguj sie</button>
            </form>

            <p id="login-message" class="auth-message hidden" aria-live="polite"></p>
        </section>
    </main>

    <script src="/login/login.js"></script>
</body>
</html>
